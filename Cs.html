<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nursing AI Simulation</title>

<style>
body{
font-family:Tahoma,sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
max-width:1000px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

button{
background:#0d6efd;
color:#fff;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#chat{
height:450px;
overflow:auto;
border:1px solid #ddd;
padding:15px;
border-radius:10px;
background:#fafafa;
margin-top:20px;
}

.patient{
background:#ffe5e5;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.student{
background:#dff1ff;
padding:10px;
border-radius:10px;
margin:10px 0;
}

textarea{
width:100%;
height:80px;
padding:10px;
margin-top:10px;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<div class="card">

<h1>🏥 Nursing AI Simulation</h1>

<p>أدخل مفتاح OpenAI API للتجربة:</p>

<input
id="apiKey"
type="password"
placeholder="sk-..."
style="width:100%;padding:10px;"
>

<br><br>

<button onclick="claimCase()">
📋 استلام الحالة
</button>

</div>

<div id="caseBox" class="card hidden"></div>

<div id="chatBox" class="card hidden">

<h3>المحادثة</h3>

<div id="chat"></div>

<textarea
id="message"
placeholder="اكتب سؤالك للمريض..."
></textarea>

<br>

<button onclick="sendMessage()">
إرسال
</button>

<button onclick="finishCase()">
✅ إنهاء المقابلة
</button>

</div>

<div id="resultBox" class="card hidden"></div>

<script>

let messages = [];

let patientSystemPrompt = `
You are a virtual patient in a nursing OSCE simulation.

Patient Name: Ahmed Mohamed
Age: 58

Chief Complaint:
Chest pain

Hidden Information:
- Started 1 hour ago
- Pressure-like pain
- Radiates to left arm
- Hypertension
- Diabetes
- Smoker for 20 years

Rules:
- Answer only as the patient.
- Never reveal information unless asked.
- Never reveal diagnosis.
- Use realistic answers.
- Short responses.
`;

function claimCase(){

document.getElementById("caseBox").classList.remove("hidden");
document.getElementById("chatBox").classList.remove("hidden");

document.getElementById("caseBox").innerHTML=`

<h2>📄 الحالة المستلمة</h2>

<p><b>الاسم:</b> أحمد محمد</p>

<p><b>العمر:</b> 58 سنة</p>

<p><b>الشكوى الرئيسية:</b> ألم بالصدر</p>

<p><b>المهمة:</b> قم بأخذ التاريخ المرضي الكامل.</p>

`;

messages = [
{
role:"system",
content:patientSystemPrompt
},
{
role:"assistant",
content:"السلام عليكم، عندي وجع في صدري من حوالي ساعة."
}
];

document.getElementById("chat").innerHTML=`
<div class="patient">
👨‍🦳 السلام عليكم، عندي وجع في صدري من حوالي ساعة.
</div>
`;

}

async function sendMessage(){

const apiKey =
document.getElementById("apiKey").value;

if(!apiKey){
alert("ضع مفتاح API");
return;
}

const input =
document.getElementById("message");

const text = input.value.trim();

if(!text) return;

document.getElementById("chat").innerHTML += `
<div class="student">
🧑‍⚕️ ${text}
</div>
`;

messages.push({
role:"user",
content:text
});

input.value="";

const response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:messages
})
}
);

const data = await response.json();

const reply =
data.choices[0].message.content;

messages.push({
role:"assistant",
content:reply
});

document.getElementById("chat").innerHTML += `
<div class="patient">
👨‍🦳 ${reply}
</div>
`;

}

async function finishCase(){

const apiKey =
document.getElementById("apiKey").value;

const evaluationPrompt = `
You are an OSCE nursing examiner.

Evaluate the nursing student.

Return HTML only.

Give:

Overall Score /100

Communication

History Taking

Clinical Judgment

Strengths

Weaknesses
`;

const conversation = messages.map(
m=>m.role + ": " + m.content
).join("\n");

const response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:[
{
role:"system",
content:evaluationPrompt
},
{
role:"user",
content:conversation
}
]
})
}
);

const data = await response.json();

document.getElementById("resultBox")
.classList.remove("hidden");

document.getElementById("resultBox")
.innerHTML =
data.choices[0].message.content;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}
</script>

</body>
</html>
