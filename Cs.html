<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Nursing AI Simulation</title>

<style>
body{
font-family:Arial;
background:#f4f7fb;
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

button{
padding:10px 15px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

#chat{
height:400px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
background:#fafafa;
border-radius:10px;
}

.user{background:#dbeafe;padding:8px;margin:5px;border-radius:8px;}
.ai{background:#fee2e2;padding:8px;margin:5px;border-radius:8px;}

input{
width:70%;
padding:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>🏥 Nursing AI Simulation</h2>

<input id="apiKey" type="password" placeholder="ضع OpenAI API Key هنا">

<br><br>

<button onclick="claimCase()">📋 استلام الحالة</button>
<button onclick="finish()">🏁 إنهاء وتقييم</button>
</div>

<div class="card" id="caseBox" style="display:none;"></div>

<div class="card" id="chatBox" style="display:none;">

<div id="chat"></div>

<br>

<input id="input" placeholder="اكتب سؤالك للمريض">
<button onclick="send()">إرسال</button>

</div>

<div class="card" id="result"></div>

<script>

let messages = [];

const systemPrompt = `
You are a virtual patient in nursing OSCE.

Patient:
Name: Ahmed Mohamed
Age: 58

Case:
Chest pain

Hidden info:
- started 1 hour ago
- pressure-like pain
- radiates left arm
- smoker
- diabetes + hypertension

Rules:
- answer as patient only
- match user language (Arabic/English)
- realistic answers
- never reveal diagnosis
`;

function claimCase(){

document.getElementById("caseBox").style.display="block";
document.getElementById("chatBox").style.display="block";

document.getElementById("caseBox").innerHTML=`
<h3>📄 الحالة</h3>
<p>Chest Pain Case - Ahmed Mohamed</p>
<p>ابدأ المقابلة</p>
`;

messages = [
{role:"system",content:systemPrompt},
{role:"assistant",content:"السلام عليكم... عندي وجع في صدري من ساعة."}
];

document.getElementById("chat").innerHTML=
`<div class="ai">👨‍🦳 عندي وجع في صدري من ساعة</div>`;
}

async function send(){

const apiKey = document.getElementById("apiKey").value;
if(!apiKey) return alert("ضع API Key");

const text = document.getElementById("input").value;
if(!text) return;

messages.push({role:"user",content:text});

document.getElementById("chat").innerHTML+=
`<div class="user">🧑‍⚕️ ${text}</div>`;

document.getElementById("input").value="";

const res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:messages
})
});

const data = await res.json();

const reply = data.choices[0].message.content;

messages.push({role:"assistant",content:reply});

document.getElementById("chat").innerHTML+=
`<div class="ai">👨‍🦳 ${reply}</div>`;
}

async function finish(){

const apiKey = document.getElementById("apiKey").value;

const conversation = messages.map(m=>m.role+": "+m.content).join("\n");

const res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:[
{
role:"system",
content:`
You are OSCE examiner.

Return ONLY JSON:
{
 total: number,
 communication: number,
 history: number,
 clinical: number,
 strengths: [],
 weaknesses: []
}
`
},
{
role:"user",
content:conversation
}
]
})
});

const data = await res.json();

const result = JSON.parse(data.choices[0].message.content);

document.getElementById("result").innerHTML=`
<h3>📊 النتيجة</h3>
<p>Overall: ${result.total}/100</p>
<p>Communication: ${result.communication}</p>
<p>History: ${result.history}</p>
<p>Clinical: ${result.clinical}</p>

<h4>✔️ نقاط القوة</h4>
<ul>${result.strengths.map(s=>`<li>${s}</li>`).join("")}</ul>

<h4>❌ نقاط الضعف</h4>
<ul>${result.weaknesses.map(w=>`<li>${w}</li>`).join("")}</ul>
`;

}

</script>

</body>
</html>
