<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاكي السريري الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #0056b3; color: white; padding: 15px; text-align: center; }
        .patient-info { background: #e9ecef; padding: 10px 15px; font-size: 14px; border-bottom: 1px solid #ddd; }
        .chat-box { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-start; background: #0056b3; color: white; border-bottom-right-radius: 0; }
        .ai-msg { align-self: flex-end; background: #e0e0e0; color: black; border-bottom-left-radius: 0; }
        .eval-msg { align-self: center; background: #ffeb3b; color: #333; font-weight: bold; border-radius: 10px; text-align: center; width: 90%; border: 2px solid #fbc02d; }
        .input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; background: white; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; font-family: inherit; }
        button { background: #0056b3; color: white; border: none; padding: 10px 15px; margin-right: 10px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: bold; }
        button:hover { background: #004494; }
    </style>
</head>
<body>

    <div class="container" id="simulator-screen">
        <div class="header">
            <h3 style="margin: 0;">المحاكي السريري الذكي - قسم الطوارئ</h3>
        </div>
        <div class="patient-info">
            <strong>ملف المريض:</strong> أحمد (45 سنة) | <strong>الشكوى:</strong> جفاف شديد، قيء وإسهال منذ يومين.
        </div>
        
        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">أنا دايخ جداً يا دكتور وحاسس إني هقع من طولي بقالي يومين برجع.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب سؤالك أو التدخل التمريضي هنا..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // حط المفتاح الجديد بتاعك اللي بيبدأ بـ AQ بين علامتين التنصيص هنا
        const apiKey = 'AQ.Ab8RN6KRKHBZhxCXvZJUMCqrofpAbFsEEMRco20Nu1t-ZIo3ng';
        
        let chatHistory = [];
        let isFirstMessage = true;
        
        // التعليمات اللي هتتبعت في الخلفية مع أول رسالة عشان نبرمج شخصية المريض
        const systemInstruction = `
[تعليمات برمجية صارمة جداً - أنت تعمل في وضعين متتاليين]:
أولاً: تقمص دور المريض (أحمد 45 سنة، جفاف شديد وهبوط). أجب باختصار ولا تقدم أي معلومات طبية، فقط اشكُ من الأعراض.
ثانياً: استمر في دور المريض حتى يذكر الطالب مقاس الكانيولا.
ثالثاً: بمجرد أن يختار الطالب مقاس الكانيولا، اخرج من الشخصية واكتب تقييماً طبياً دقيقاً يبدأ بكلمة [التقييم النهائي]:
- إذا اختار الكانيولا الخضراء (18G) أو الرصاصي (16G): قل "قرار ممتاز طبياً لتعويض السوائل".
- إذا اختار الزرقاء (22G) أو البمبي (20G) أو الصفراء (24G) أو غيرها: قل "قرار خاطئ، المقاس الصغير لن يسعف المريض".
`;

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            addMessageToUI(messageText, 'user-msg');
            inputField.value = '';
            
            // حقن التعليمات الصارمة في أول رسالة فقط
            let finalMessageToSend = messageText;
            if (isFirstMessage) {
                finalMessageToSend = systemInstruction + "\n\nرسالة الطالب:\n" + messageText;
                isFirstMessage = false;
            }

            chatHistory.push({ role: "user", parts: [{ text: finalMessageToSend }] });

            const loadingId = "loading-" + Date.now();
            addMessageToUI('جاري التحليل...', 'ai-msg', loadingId);

            try {
                // استخدمنا هنا gemini-pro الموديل المستقر 100%
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: chatHistory,
                        generationConfig: { temperature: 0.1 }
                    })
                });

                const data = await response.json();
                
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();

                if (data.error) {
                    addMessageToUI('حدث خطأ: ' + data.error.message, 'eval-msg');
                    return;
                }

                const aiReply = data.candidates[0].content.parts[0].text;
                
                chatHistory.push({ role: "model", parts: [{ text: aiReply }] });
                
                if (aiReply.includes('[التقييم النهائي]')) {
                    addMessageToUI(aiReply, 'eval-msg');
                } else {
                    addMessageToUI(aiReply, 'ai-msg');
                }

            } catch (error) {
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                addMessageToUI('حدث خطأ في الشبكة، تأكد من الاتصال.', 'eval-msg');
            }
        }

        function addMessageToUI(text, className, id = '') {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            msgDiv.innerText = text;
            if (id) msgDiv.id = id;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
