<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: #050505;
        --text-main: #e0f2fe;
        --glass-bg: rgba(15, 23, 42, 0.4);
        --glass-border: rgba(0, 242, 254, 0.15);
        --task-bg: rgba(255, 255, 255, 0.02);
        --task-hover: rgba(0, 242, 254, 0.05);
        --primary-glow: rgba(0, 242, 254, 0.4);
        --btn-open-bg: rgba(0, 242, 254, 0.1);
        --btn-open-text: #00f2fe;
        --counter-bg: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        --counter-text: #000;
        --bg-glow-1: rgba(0, 242, 254, 0.08);
        --bg-glow-2: rgba(0, 150, 255, 0.05);
    }

    body.light-mode {
        --bg-main: #f0f8ff;
        --text-main: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.6);
        --glass-border: rgba(0, 150, 255, 0.3);
        --task-bg: rgba(255, 255, 255, 0.5);
        --task-hover: rgba(0, 150, 255, 0.15);
        --primary-glow: rgba(0, 150, 255, 0.3);
        --btn-open-bg: rgba(0, 150, 255, 0.15);
        --btn-open-text: #0284c7;
        --counter-bg: linear-gradient(135deg, #0284c7 0%, #00f2fe 100%);
        --counter-text: #fff;
        --bg-glow-1: rgba(0, 150, 255, 0.1);
        --bg-glow-2: rgba(0, 242, 254, 0.1);
    }

    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: var(--bg-main);
        background-image: 
            radial-gradient(circle at 15% 50%, var(--bg-glow-1), transparent 40%),
            radial-gradient(circle at 85% 30%, var(--bg-glow-2), transparent 40%);
        color: var(--text-main);
        font-family: 'Tajawal', sans-serif;
        display: flex;
        justify-content: center;
        transition: background-color 0.5s ease, color 0.5s ease;
    }

    .container {
        width: 100%;
        max-width: 800px;
        padding: 20px;
        box-sizing: border-box;
    }

    .top-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding: 10px 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid var(--glass-border);
    }

    .page-title {
        margin: 0;
        font-size: 1.5rem;
        flex-grow: 1;
        text-align: center;
    }

    .theme-toggle {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 5px;
        transition: transform 0.3s;
    }
    .theme-toggle:hover {
        transform: rotate(20deg) scale(1.1);
    }

    #content {
        width: 100%;
        font-size: 1.2rem;
    }

    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.02);
        padding: 25px;
        border-radius: 20px;
        margin-bottom: 20px;
        /* تم تغيير المحاذاة ليكون العنوان والوصف في المنتصف */
        text-align: center; 
        counter-reset: task-counter; 
        transition: all 0.4s ease;
    }

    .task {
        position: relative;
        background: var(--task-bg);
        border: 1px solid var(--glass-border);
        margin: 15px 0;
        padding: 15px 55px 15px 15px; 
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        /* تم إرجاع محاذاة المهام لليمين حتى لا يتشوه شكلها */
        text-align: right; 
    }

    .task:hover {
        background: var(--task-hover);
        border-color: var(--primary-glow);
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
    }

    .task::before {
        counter-increment: task-counter;
        content: counter(task-counter);
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        background: var(--counter-bg);
        color: var(--counter-text);
        font-weight: 700;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary-glow);
    }

    button {
        padding: 8px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .open {
        background: var(--btn-open-bg);
        color: var(--btn-open-text);
        border: 1px solid var(--btn-open-text);
    }

    .open:hover {
        background: var(--btn-open-text);
        color: var(--bg-main);
        box-shadow: 0 0 15px var(--primary-glow);
    }

    .done {
        background: linear-gradient(135deg, #0ba360 0%, #3bc171 100%);
        color: #fff;
        width: 100%;
        margin-top: 15px;
        padding: 14px;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }

    .done:hover {
        box-shadow: 0 8px 20px rgba(11, 163, 96, 0.4);
        transform: translateY(-2px);
    }

    /* --- تصميم النافذة المنبثقة (Popup Modal) --- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s ease;
    }
    
    .modal-overlay.show {
        opacity: 1;
        visibility: visible;
    }

    .modal-content {
        max-width: 400px;
        width: 90%;
        text-align: center;
        transform: translateY(-30px) scale(0.95);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 30px;
    }

    .modal-overlay.show .modal-content {
        transform: translateY(0) scale(1);
    }

    .modal-content h2 {
        margin-top: 0;
        color: var(--btn-open-text);
        text-shadow: 0 0 10px var(--primary-glow);
    }

    .modal-actions {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 25px;
    }

    /* زر المشاهدة */
    .btn-watch {
        background: var(--counter-bg);
        color: var(--counter-text);
        text-decoration: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-weight: 700;
        box-shadow: 0 5px 15px var(--primary-glow);
        transition: all 0.3s ease;
        display: inline-block;
    }
    .btn-watch:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px var(--primary-glow);
    }

    /* زر الإلغاء */
    .btn-close {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        border: 1px solid var(--glass-border);
    }
    .btn-close:hover {
        background: rgba(255, 59, 48, 0.1);
        border-color: #ff3b30;
        color: #ff3b30;
    }

    @media (max-width: 600px) {
        .card { padding: 15px; }
        .task { 
            padding: 15px 45px 15px 10px;
            flex-direction: column;
            align-items: stretch;
            text-align: right;
        }
        .task::before { right: 10px; width: 25px; height: 25px; font-size: 0.9rem; }
        .open { width: 100%; margin-top: 10px; }
    }
</style>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>
<body>

<div id="tutorialModal" class="modal-overlay">
    <div class="modal-content card">
        <h2>طريقة تخطي الرابط 🚀</h2>
        <p>هل تواجه صعوبة؟ شاهد هذا الفيديو القصير لتعرف كيف تتخطى الرابط بسهولة.</p>
        <div class="modal-actions">
            <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank" id="watchBtn" class="btn-watch">مشاهدة الفيديو</a>
            <button id="closeModalBtn" class="btn-close">لا، شكراً</button>
        </div>
    </div>
</div>

<div class="container">
    <header class="top-header">
        <button id="themeToggle" class="theme-toggle" title="تغيير الإضاءة">☀️</button>
        <h1 class="page-title">HemaTech</h1>
        <div style="width: 36px;"></div> 
    </header>

    <div id="content">Loading...</div>
</div>

<script type="module" src="./js/task.js"></script>

<script>
    // --- سكريبت الوضع الليلي والنهاري ---
    const themeToggleBtn = document.getElementById('themeToggle');
    const body = document.body;

    themeToggleBtn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        if (body.classList.contains('light-mode')) {
            themeToggleBtn.textContent = '🌙';
        } else {
            themeToggleBtn.textContent = '☀️';
        }
    });

    // --- سكريبت النافذة المنبثقة (Popup) ---
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('tutorialModal');
        const closeBtn = document.getElementById('closeModalBtn');
        const watchBtn = document.getElementById('watchBtn');

        // إظهار النافذة بعد نصف ثانية من تحميل الصفحة
        setTimeout(() => {
            modal.classList.add('show');
        }, 500);

        // إخفاء النافذة عند الضغط على "لا، شكراً"
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // إخفاء النافذة عند الضغط على زر المشاهدة (لأن الفيديو هيفتح في نافذة جديدة)
        watchBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // إخفاء النافذة لو المستخدم ضغط في أي مكان برا المربع
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });
    });
</script>

</body>
</html>
