<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المهمة</title>

<style>
/* خلفية ملونة ومتحركة لإبراز تأثير الزجاج */
body {
    background: linear-gradient(135deg, #1e3a8a, #0f172a, #064e3b);
    background-size: 300% 300%;
    animation: gradientBG 15s ease infinite;
    color: white;
    font-family: tahoma, sans-serif;
    padding: 20px;
    min-height: 100vh;
    margin: 0;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 800px;
    margin: auto;
}

/* تصميم الكارت الزجاجي */
.card {
    background: rgba(255, 255, 255, 0.05); /* شفافية خفيفة */
    backdrop-filter: blur(15px); /* التمويه الزجاجي */
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1); /* حواف مضيئة خفيفة */
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* ظل لإعطاء عمق */
    padding: 20px;
    border-radius: 16px;
}

img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

/* تصميم المهام الزجاجي */
.task {
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.3s ease, background 0.3s ease;
}

.task:hover {
    transform: translateY(-3px);
    background: rgba(0, 0, 0, 0.3);
}

/* تصميم الأزرار متناسق مع الزجاج */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

.open {
    background: rgba(37, 99, 235, 0.6);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(37, 99, 235, 0.4);
    color: white;
}

.open:hover {
    background: rgba(37, 99, 235, 0.9);
    box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
}

.done {
    background: rgba(22, 163, 74, 0.6);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(22, 163, 74, 0.4);
    color: white;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    font-size: 16px;
}

.done:hover {
    background: rgba(22, 163, 74, 0.9);
    box-shadow: 0 0 10px rgba(22, 163, 74, 0.5);
}
</style>
</head>
<body>

<div class="container" id="content">
<p>جاري التحميل...</p>
</div>

<script type="module" src="./js/task.js"></script>

</body>
</html>
