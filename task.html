<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المهمة</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:tahoma;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

img{
    width:100%;
    border-radius:12px;
    margin-bottom:10px;
}

.task{
    background:#0b1220;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.open{
    background:#2563eb;
    color:white;
}

.done{
    background:#16a34a;
    color:white;
    width:100%;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container" id="content">
<p>جاري التحميل...</p>
</div>

<script type="module" src="./js/task.js"></script>

</body>
</html>
