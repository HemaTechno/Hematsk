<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>زجاج المهام | لوحة تحكم أنيقة</title>

<style>
  /* RESET & BASE - تصميم زجاجي عصري */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, 'Cairo', sans-serif;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, rgba(15, 25, 55, 0.95), rgba(8, 12, 25, 1)),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
    background-attachment: fixed;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* الحاوية الرئيسية - تأثير زجاجي مصقول */
  .glass-container {
    max-width: 950px;
    width: 100%;
    margin: 0 auto;
    backdrop-filter: blur(0px);
  }

  /* بطاقة الزجاج الرئيسية (Glassmorphism core) */
  .glass-card {
    background: rgba(25, 35, 55, 0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 2rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    padding: 1.5rem;
    transition: all 0.2s ease;
  }

  /* رأس القائمة */
  .glass-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    background: linear-gradient(135deg, #FFF, #b9d0ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  h1::before {
    content: "✨";
    font-size: 1.6rem;
    background: none;
    color: #ffdf8c;
    -webkit-background-clip: unset;
  }
  .stats-badge {
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(4px);
    padding: 6px 14px;
    border-radius: 60px;
    font-size: 0.85rem;
    font-weight: 500;
    border: 1px solid rgba(255,255,240,0.2);
    color: #e2e8ff;
  }

  /* عناصر المهام - glassmorphism خفيف */
  .task-item {
    background: rgba(15, 25, 45, 0.55);
    backdrop-filter: blur(8px);
    margin-bottom: 12px;
    padding: 14px 18px;
    border-radius: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
  }
  .task-item:hover {
    background: rgba(35, 50, 75, 0.65);
    border-color: rgba(255, 215, 150, 0.4);
    transform: translateY(-2px);
  }
  .task-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .task-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #f1f5ff;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .task-desc {
    font-size: 0.8rem;
    color: #b9c7e0;
    opacity: 0.9;
  }
  .task-status {
    font-size: 0.7rem;
    background: rgba(0,0,0,0.5);
    padding: 3px 8px;
    border-radius: 30px;
    width: fit-content;
  }
  .status-badge {
    background: #2d3a5e;
    color: #b9d0ff;
  }
  .status-completed {
    background: #1f4a2d;
    color: #b4ffcf;
  }
  
  /* مجموعة الأزرار */
  .task-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    border: none;
    padding: 8px 16px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,245,0.1);
    backdrop-filter: blur(4px);
    color: white;
    border: 0.5px solid rgba(255,255,200,0.3);
  }
  .btn-primary {
    background: linear-gradient(105deg, #2563eb, #3b82f6);
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .btn-primary:hover {
    background: linear-gradient(105deg, #3b82f6, #60a5fa);
    transform: scale(0.97);
    box-shadow: 0 1px 4px rgba(37,99,235,0.5);
  }
  .btn-success {
    background: linear-gradient(105deg, #15803d, #22c55e);
  }
  .btn-success:hover {
    background: #16a34a;
    transform: scale(0.97);
  }
  .btn-outline {
    background: rgba(30, 40, 60, 0.7);
    border: 1px solid rgba(255,215,150,0.6);
  }
  .btn-outline:hover {
    background: #334155;
  }
  .reset-btn {
    background: rgba(100, 40, 40, 0.7);
    border-color: #ef4444;
  }
  .reset-btn:hover {
    background: #b91c1c;
  }
  
  /* صورة زجاجية مع تأثير */
  .glass-image {
    width: 100%;
    border-radius: 1.5rem;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,200,0.25);
    box-shadow: 0 12px 20px -8px black;
    transition: 0.3s;
    backdrop-filter: blur(2px);
    display: block;
    object-fit: cover;
    max-height: 220px;
  }
  
  /* زر إتمام الكل */
  .complete-all-wrapper {
    margin-top: 1.4rem;
    text-align: center;
  }
  .btn-done-all {
    background: rgba(34, 197, 94, 0.2);
    backdrop-filter: blur(8px);
    border: 1px solid #22c55e;
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .btn-done-all:hover {
    background: #22c55e;
    color: #0a0f1f;
    box-shadow: 0 0 12px #22c55e80;
  }
  
  /* رسالة فارغة */
  .empty-message {
    text-align: center;
    padding: 2rem;
    background: rgba(0,0,0,0.3);
    border-radius: 1.8rem;
    font-style: italic;
    color: #b9c7ff;
  }
  
  /* footer */
  .glass-footer {
    margin-top: 1rem;
    text-align: center;
    font-size: 0.7rem;
    opacity: 0.6;
  }
  
  @media (max-width: 550px) {
    body { padding: 1rem; }
    .glass-card { padding: 1rem; }
    .task-item { flex-direction: column; align-items: flex-start; gap: 12px; }
    .task-actions { width: 100%; justify-content: flex-start; }
    .btn { padding: 6px 14px; }
  }
  
  /* مؤثرات إضافية */
  .glow-text {
    text-shadow: 0 0 6px rgba(59,130,246,0.5);
  }
</style>
</head>
<body>

<div class="glass-container" id="appRoot">
  <div class="glass-card">
    <div class="glass-header">
      <h1>📋 لوحة المهمة الزجاجية</h1>
      <div class="stats-badge" id="statsDisplay">0 / 0 مهام</div>
    </div>
    
    <!-- منطقة الصورة الزجاجية (مضمنة بدلاً من تحميل خارجي، صورة SVG أنيقة) -->
    <div style="position: relative;">
      <img class="glass-image" id="dynamicImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 300'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6' stop-opacity='0.7'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6' stop-opacity='0.5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='800' height='300' fill='%231e293b'/%3E%3Crect width='800' height='300' fill='url(%23g)'/%3E%3Ctext x='50%25' y='45%25' font-size='28' fill='white' font-family='monospace' text-anchor='middle' dominant-baseline='middle'%3E✨ مهام زجاجية ✨%3C/text%3E%3Ctext x='50%25' y='65%25' font-size='16' fill='%23cbd5e1' text-anchor='middle'%3Eأناقة عصرية بشفافية فائقة%3C/text%3E%3C/svg%3E"
           alt="مفهوم زجاجي">
    </div>
    
    <!-- قائمة المهام ديناميكية -->
    <div id="tasksContainer">
      <!-- ستحقن JS المهام هنا -->
      <div class="empty-message">✨ جاري تحميل المهام الشفافة...</div>
    </div>
    
    <!-- زر إنجاز الكل مع لمسة زجاجية -->
    <div class="complete-all-wrapper">
      <button id="completeAllBtn" class="btn btn-done-all">✔️ إنجاز جميع المهام</button>
    </div>
    <div class="glass-footer">
      <span>🌟 نظام زجاجي | اضغط على ✔️ لإتمام المهمة</span>
    </div>
  </div>
</div>

<script type="module">
  // ---------- بيانات المهام (مصفوفة كاملة مع وصف وصورة رمزية) ----------
  const defaultTasks = [
    { id: 1, title: "🚀 تطوير واجهة الزجاج", description: "تطبيق glassmorphism كامل مع تأثير blur وشفافية.", completed: false },
    { id: 2, title: "🎨 ضبط الألوان المتدرجة", description: "تحسين التباين والألوان لتناسب المظهر الليلي المتوهج.", completed: false },
    { id: 3, title: "📱 جعل التصميم متجاوباً", description: "تناسق تام مع الجوال والأجهزة اللوحية.", completed: false },
    { id: 4, title: "✨ إضافة مؤثرات hover", description: "تحريك ناعم وإضاءة على عناصر المهام.", completed: false },
    { id: 5, title: "🪟 توثيق الكود", description: "أناقة برمجية مع modularity ووضوح.", completed: true }  // نموذج مهمة منجزة
  ];
  
  // تخزين المهام الحالية
  let tasks = [];
  
  // عناصر DOM
  const tasksContainer = document.getElementById('tasksContainer');
  const statsDisplay = document.getElementById('statsDisplay');
  const completeAllBtn = document.getElementById('completeAllBtn');
  const dynamicImage = document.getElementById('dynamicImage');
  
  // --- تحديث الإحصائيات (عدد المهام المنجزة / الإجمالي) ---
  function updateStats() {
    const total = tasks.length;
    const completedCount = tasks.filter(task => task.completed === true).length;
    statsDisplay.innerText = `✅ ${completedCount} / ${total} مهام`;
    if (total === 0) {
      statsDisplay.innerText = `📭 0 مهام`;
    }
    // تغيير بسيط في لون الصورة أو تأثير عائم (اختياري)
    if (completedCount === total && total > 0) {
      dynamicImage.style.boxShadow = "0 0 12px #22c55e80";
    } else {
      dynamicImage.style.boxShadow = "0 12px 20px -8px black";
    }
  }
  
  // --- حفظ المهام في localStorage (اختياري لاستمرارية الجلسة) ---
  function saveToLocal() {
    localStorage.setItem('glassTasks', JSON.stringify(tasks));
  }
  
  // --- تحميل المهام من localStorage أو البيانات الافتراضية ---
  function loadTasks() {
    const stored = localStorage.getItem('glassTasks');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed) && parsed.length) {
          tasks = parsed;
        } else {
          tasks = [...defaultTasks];
        }
      } catch(e) { tasks = [...defaultTasks]; }
    } else {
      tasks = [...defaultTasks];
    }
    renderTasks();
  }
  
  // --- تبديل حالة إتمام المهمة (Toggle) ---
  function toggleTaskCompletion(taskId) {
    tasks = tasks.map(task => 
      task.id === taskId ? { ...task, completed: !task.completed } : task
    );
    saveToLocal();
    renderTasks();
  }
  
  // --- إنجاز جميع المهام (وضع completed: true للكل) ---
  function completeAllTasks() {
    if (tasks.length === 0) {
      // يمكن عرض رسالة سريعة لكن لا شيء
      return;
    }
    const allCompleted = tasks.every(task => task.completed === true);
    if (allCompleted) {
      // تنبيه بسيط لكن ليس إجباري: إذا كانت كلها منجزة يمكن إظهار رسالة عبر console
      // أو عمل تأثير vibrate بسيط ولكن نفضل إعادة تعيينها؟ لا، فقط نخبر أن الكل منجز مسبقاً.
      // لكن من باب الرفاهية ننبه.
      const toastMsg = document.createElement('div');
      toastMsg.innerText = "🎉 جميع المهام منجزة بالفعل!";
      toastMsg.style.position = "fixed";
      toastMsg.style.bottom = "20px";
      toastMsg.style.left = "50%";
      toastMsg.style.transform = "translateX(-50%)";
      toastMsg.style.background = "rgba(34,197,94,0.9)";
      toastMsg.style.backdropFilter = "blur(12px)";
      toastMsg.style.padding = "10px 24px";
      toastMsg.style.borderRadius = "60px";
      toastMsg.style.color = "white";
      toastMsg.style.zIndex = "999";
      toastMsg.style.fontWeight = "bold";
      document.body.appendChild(toastMsg);
      setTimeout(() => toastMsg.remove(), 1800);
      return;
    }
    tasks = tasks.map(task => ({ ...task, completed: true }));
    saveToLocal();
    renderTasks();
    // إظهار رسالة منبثقة قصيرة جميلة زجاجية
    const notification = document.createElement('div');
    notification.innerText = "✔️ تم إنجاز جميع المهام بنجاح!";
    notification.style.position = "fixed";
    notification.style.bottom = "25px";
    notification.style.right = "25px";
    notification.style.background = "rgba(0,0,0,0.6)";
    notification.style.backdropFilter = "blur(18px)";
    notification.style.border = "1px solid #22c55e";
    notification.style.padding = "10px 22px";
    notification.style.borderRadius = "50px";
    notification.style.color = "#e2ffd6";
    notification.style.fontWeight = "500";
    notification.style.zIndex = "1000";
    notification.style.fontSize = "0.9rem";
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 2000);
  }
  
  // --- حذف مهمة (ميزة إضافية ولكنها عملية، تجعل التطبيق كامل) ---
  function deleteTask(taskId) {
    tasks = tasks.filter(task => task.id !== taskId);
    saveToLocal();
    renderTasks();
    // رسالة خفيفة
    const delMsg = document.createElement('div');
    delMsg.innerText = "🗑️ تم حذف المهمة";
    delMsg.style.cssText = `position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.6); backdrop-filter:blur(12px); padding:6px 18px; border-radius:40px; color:#ffb7b7; font-size:0.8rem; z-index:1000; border-right:3px solid #f97316`;
    document.body.appendChild(delMsg);
    setTimeout(() => delMsg.remove(), 1300);
  }
  
  // --- عرض قائمة المهام بطريقة زجاجية تفاعلية ---
  function renderTasks() {
    if (!tasksContainer) return;
    
    if (tasks.length === 0) {
      tasksContainer.innerHTML = `<div class="empty-message">✨ لا توجد مهام حالياً ✨<br><span style="font-size:0.75rem;">أضف مهمة أو قم بتحديث الصفحة لاستعادة العينات</span></div>`;
      updateStats();
      return;
    }
    
    let html = '';
    tasks.forEach(task => {
      const statusText = task.completed ? 'مُنجزة ✓' : 'قيد الانتظار';
      const statusClass = task.completed ? 'status-completed' : 'status-badge';
      // أيقونة تعبر عن حالة المهمة
      const checkIcon = task.completed ? '✅' : '⏳';
      
      html += `
        <div class="task-item" data-id="${task.id}">
          <div class="task-info">
            <div class="task-title">
              <span>${task.title}</span>
              <span class="task-status ${statusClass}">${statusText} ${checkIcon}</span>
            </div>
            <div class="task-desc">${task.description || 'وصف المهمة'}</div>
          </div>
          <div class="task-actions">
            <button class="btn btn-primary complete-single" data-id="${task.id}" data-action="toggle" style="background: linear-gradient(105deg, #2563eb, #3b82f6);">
              ${task.completed ? '↺ تراجع' : '✔️ إنجاز'}
            </button>
            <button class="btn btn-outline delete-single" data-id="${task.id}" data-action="delete" style="background: rgba(120,40,40,0.7); border-color:#ef9f9f;">
              🗑️ حذف
            </button>
          </div>
        </div>
      `;
    });
    
    tasksContainer.innerHTML = html;
    updateStats();
    
    // إضافة مستمعي الأحداث للأزرار الديناميكية (تجنب إعادة binding زائدة)
    document.querySelectorAll('.complete-single').forEach(btn => {
      btn.removeEventListener('click', handleToggleClick);
      btn.addEventListener('click', handleToggleClick);
    });
    document.querySelectorAll('.delete-single').forEach(btn => {
      btn.removeEventListener('click', handleDeleteClick);
      btn.addEventListener('click', handleDeleteClick);
    });
  }
  
  // معالج أحداث التبديل
  function handleToggleClick(event) {
    event.stopPropagation();
    const btn = event.currentTarget;
    const taskId = parseInt(btn.getAttribute('data-id'));
    if (!isNaN(taskId)) {
      toggleTaskCompletion(taskId);
    }
  }
  
  function handleDeleteClick(event) {
    event.stopPropagation();
    const btn = event.currentTarget;
    const taskId = parseInt(btn.getAttribute('data-id'));
    if (!isNaN(taskId)) {
      deleteTask(taskId);
    }
  }
  
  // --- إعادة ضبط البيانات إلى الافتراضيات (اختيار ذكي لإظهار القائمة الأصلية، أضفنا زر مخفي أو نضيف زر؟ 
  // --- ولكن ربما نجعل الصورة تنقر ثلاث مرات لإعادة تعيين، لكن الأفضل إضافة زر إعادة تعيين أنيق في الهيدر (زيادة)
  // --- تحسين : إضافة زر إعادة ضبط داخل الهيدر بشكل زجاجي
  function addResetButton() {
    const headerDiv = document.querySelector('.glass-header');
    if (headerDiv && !document.getElementById('resetDataBtn')) {
      const resetBtn = document.createElement('button');
      resetBtn.id = 'resetDataBtn';
      resetBtn.innerText = '🔄 إعادة ضبط';
      resetBtn.className = 'btn';
      resetBtn.style.background = 'rgba(100,70,120,0.6)';
      resetBtn.style.padding = '6px 14px';
      resetBtn.style.fontSize = '0.75rem';
      resetBtn.style.border = '1px solid #a78bfa';
      resetBtn.addEventListener('click', () => {
        if (confirm('⚠️ هل تريد استعادة المهام الافتراضية؟ سيتم فقدان التغييرات الحالية.')) {
          tasks = JSON.parse(JSON.stringify(defaultTasks));
          saveToLocal();
          renderTasks();
          // إضافة رسالة زجاجية
          const resetMsg = document.createElement('div');
          resetMsg.innerText = 'تم إعادة ضبط المهام إلى الوضع الافتراضي 🌟';
          resetMsg.style.cssText = `position:fixed; bottom:20px; right:20px; background:rgba(139,92,246,0.7); backdrop-filter:blur(16px); padding:8px 20px; border-radius: 50px; color:white; font-size:0.8rem; z-index:1000;`;
          document.body.appendChild(resetMsg);
          setTimeout(() => resetMsg.remove(), 1800);
        }
      });
      headerDiv.appendChild(resetBtn);
    }
  }
  
  // --- تحديث صورة الخلفية الديناميكية (لتتناغم مع الألوان الزجاجية) يمكن تغييرها بشكل اختياري
  function setGlassImageDynamic() {
    // نضيف تأثير تغير طفيف إذا اكتملت المهام، لكن موجود بالفعل في updateStats
    // لو أردنا صورة ذات جودة عالية يمكن استخدام SVG مخصص أكثر لكن حافظنا على السابق
    // نضيف صورة زجاجية متغيرة عبر سمة data (تطابق الألوان)
    const imagesCollection = [
      "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 300'%3E%3Cdefs%3E%3ClinearGradient id='g2' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5' stop-opacity='0.7'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9' stop-opacity='0.6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='800' height='300' fill='%230f172a'/%3E%3Crect width='800' height='300' fill='url(%23g2)'/%3E%3Ctext x='50%25' y='45%25' fill='white' font-size='28' font-weight='bold' text-anchor='middle'%3E🔮 زجاج وشفافية 🔮%3C/text%3E%3Ctext x='50%25' y='68%25' fill='%23cbd5e6' font-size='14' text-anchor='middle'%3Eتأثير blur + ألوان عصرية%3C/text%3E%3C/svg%3E"
    ];
    // لا نغير الصورة بشكل عشوائي لإبقاء ثبات، ولكن يمكن اختيار أحدها
    dynamicImage.src = imagesCollection[0];
    dynamicImage.alt = "تصميم زجاجي مخصص";
  }
  
  // --- تهيئة واجهة الأحداث ---
  function initApp() {
    loadTasks();
    addResetButton();
    setGlassImageDynamic();
    if (completeAllBtn) {
      completeAllBtn.addEventListener('click', completeAllTasks);
    }
    // إضافة تأثير إضافي: إذا نقرت على الصورة يظهر تحية
    dynamicImage.addEventListener('click', () => {
      const toast = document.createElement('div');
      toast.innerText = '✨ زجاج المهام - أناقة بلا حدود ✨';
      toast.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); backdrop-filter:blur(12px); padding:8px 20px; border-radius:60px; color:#ffedb2; font-weight:500; z-index:1100; font-size:0.8rem; border:1px solid gold;`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1600);
    });
  }
  
  // بدء التطبيق
  initApp();
</script>
</body>
</html>
