<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاكي السريري الذكي</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }
        .header { 
            background: #0056b3; 
            color: white; 
            padding: 15px; 
            text-align: center; 
        }
        .patient-info { 
            background: #e9ecef; 
            padding: 10px 15px; 
            font-size: 14px; 
            border-bottom: 1px solid #ddd; 
        }
        .chat-box { 
            height: 400px; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #fafafa; 
        }
        .message { 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 15px; 
            line-height: 1.4; 
        }
        .user-msg { 
            align-self: flex-start; 
            background: #0056b3; 
            color: white; 
            border-bottom-right-radius: 0; 
        }
        .ai-msg { 
            align-self: flex-end; 
            background: #e0e0e0; 
            color: black; 
            border-bottom-left-radius: 0; 
        }
        .eval-msg { 
            align-self: center; 
            background: #ffeb3b; 
            color: #333; 
            font-weight: bold; 
            border-radius: 10px; 
            text-align: center; 
            width: 90%; 
            border: 2px solid #fbc02d;
        }
        .input-area { 
            display: flex; 
            border-top: 1px solid #ddd; 
            padding: 10px; 
            background: white; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            outline: none; 
            font-family: inherit;
        }
        button { 
            background: #0056b3; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            margin-right: 10px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-family: inherit;
            font-weight: bold;
        }
        button:hover { 
            background: #004494; 
        }
        .api-setup { 
            padding: 30px 20px; 
            text-align: center; 
        }
        .api-setup input { 
            width: 80%; 
            margin-bottom: 15px; 
            text-align: left;
            direction: ltr;
        }
    </style>
</head>
<body>

    <div class="container" id="api-screen">
        <div class="header">
            <h3>إعداد المحاكي</h3>
        </div>
        <div class="api-setup">
            <p>أدخل مفتاح Google Gemini API الخاص بك للبدء في تشغيل المحاكي:</p>
            <input type="text" id="api-key-input" placeholder="Paste your API Key here...">
            <br>
            <button onclick="startSimulator()">ابدأ المحاكاة</button>
        </div>
    </div>

    <div class="container" id="simulator-screen" style="display: none;">
        <div class="header">
            <h3 style="margin: 0;">المحاكي السريري الذكي - قسم الطوارئ</h3>
        </div>
        <div class="patient-info">
            <strong>ملف المريض:</strong> أحمد (45 سنة) | <strong>الشكوى:</strong> جفاف شديد، قيء وإسهال منذ يومين.
        </div>
        
        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">أنا دايخ جداً يا دكتور وحاسس إني هقع من طولي بقالي يومين برجع.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب سؤالك أو التدخل التمريضي هنا..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        let apiKey = '';
        let chatHistory = [];
        
        // التعليمات الصارمة الموجهة للذكاء الاصطناعي
        const systemInstruction = `
            أنت الآن تعمل في وضعين متتاليين: أولاً كـ "مريض افتراضي"، وثانياً كـ "مُقيّم طبي" لتقييم أداء طالب التمريض.
            معلومات الحالة: الاسم: أحمد، العمر: 45 سنة. الأعراض: جفاف شديد، هبوط حاد. العلامات الحيوية: ضغط 90/60، النبض 110. الأوردة ضعيفة.
            القواعد:
            1. أجب على أسئلة الطالب باختصار وبشخصية المريض المتعب.
            2. استمر في دور المريض حتى يقرر الطالب "نوع وحجم الكانيولا".
            3. بمجرد أن يكتب الطالب مقاس الكانيولا، اخرج من شخصية المريض فوراً، واكتب تقييماً طبياً دقيقاً، واحرص أن تبدأ ردك بكلمة [التقييم النهائي]:
            - إذا اختار الكانيولا الخضراء (18G) أو الرصاصي (16G): قل له قرار ممتاز طبياً لتعويض السوائل.
            - إذا اختار الكانيولا الزرقاء (22G) أو البمبي (20G) أو الصفراء (24G): قل له قرار خاطئ، المقاس الصغير لن يسمح بمرور كمية السوائل المطلوبة لإنقاذ المريض.
        `;

        // دالة بدء المحاكي وتخزين المفتاح
        function startSimulator() {
            const input = document.getElementById('api-key-input').value;
            if (input.trim() === '') {
                alert('الرجاء إدخال الـ API Key لتشغيل النظام');
                return;
            }
            apiKey = input.trim();
            document.getElementById('api-screen').style.display = 'none';
            document.getElementById('simulator-screen').style.display = 'block';
        }

        // دالة الإرسال عند الضغط على Enter
        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // دالة إرسال الرسالة للـ API
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (message === '') return;

            // إضافة رسالة الطالب للشاشة
            addMessageToUI(message, 'user-msg');
            inputField.value = '';
            
            // حفظ الرسالة في السجل
            chatHistory.push({ role: "user", parts: [{ text: message }] });

            // إضافة مؤشر التحميل
            const loadingId = "loading-" + Date.now();
            addMessageToUI('جاري تحليل الحالة...', 'ai-msg', loadingId);

            try {
                // استدعاء Gemini API مع الإصدار الأحدث
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemInstruction }] },
                        contents: chatHistory,
                        generationConfig: { temperature: 0.1 } // تقليل الإبداع لضمان الدقة الطبية
                    })
                });

                const data = await response.json();
                
                // إزالة مؤشر التحميل
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();

                if (data.error) {
                    addMessageToUI('حدث خطأ في الاتصال: ' + data.error.message, 'eval-msg');
                    return;
                }

                const aiReply = data.candidates[0].content.parts[0].text;
                
                // حفظ رد الـ API في السجل
                chatHistory.push({ role: "model", parts: [{ text: aiReply }] });
                
                // تغيير شكل الرسالة إذا كانت "تقييم نهائي"
                if (aiReply.includes('[التقييم النهائي]')) {
                    addMessageToUI(aiReply, 'eval-msg');
                } else {
                    addMessageToUI(aiReply, 'ai-msg');
                }

            } catch (error) {
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                addMessageToUI('حدث خطأ في الشبكة، تأكد من الاتصال بالإنترنت.', 'eval-msg');
            }
        }

        // دالة طباعة الرسائل في واجهة المستخدم
        function addMessageToUI(text, className, id = '') {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            msgDiv.innerText = text;
            if (id) msgDiv.id = id;
            chatBox.appendChild(msgDiv);
            
            // النزول لأسفل الشات تلقائياً
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
