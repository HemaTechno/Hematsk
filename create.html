<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء مهمة</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:tahoma;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

.task{
    background:#1e293b;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.add{
    background:#2563eb;
    color:white;
}

.save{
    background:#16a34a;
    color:white;
    width:100%;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>إنشاء صفحة مهام</h1>

<input id="title" placeholder="العنوان">

<textarea id="description" placeholder="الوصف"></textarea>

<input id="rewardLink" placeholder="رابط المكافأة">

<label>صورة (اختياري)</label>
<input type="file" id="image">

<hr>

<h2>المهام</h2>

<div id="tasksContainer"></div>

<button class="add" onclick="addTask()">
إضافة مهمة
</button>

<button class="save" onclick="saveTask()">
حفظ
</button>

</div>

<script type="module" src="./js/create.js"></script>

</body>
</html>
